<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIT Campus Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
  .header { background: #1a73e8; color: #fff; padding: 16px 20px; text-align: center; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .chat-container { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .message { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
  .user { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
  .assistant { align-self: flex-start; background: #e8e8e8; color: #222; border-bottom-left-radius: 4px; }
  .typing { align-self: flex-start; background: #e8e8e8; border-radius: 16px; padding: 10px 18px; display: none; }
  .typing span { display: inline-block; width: 8px; height: 8px; background: #999; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out; }
  .typing span:nth-child(1) { animation-delay: 0s; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  .input-bar { display: flex; gap: 8px; padding: 12px 20px; background: #fff; border-top: 1px solid #ddd; flex-shrink: 0; }
  .input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 15px; outline: none; }
  .input-bar input:focus { border-color: #1a73e8; }
  .input-bar button { background: #1a73e8; color: #fff; border: none; border-radius: 24px; padding: 10px 20px; font-size: 15px; cursor: pointer; font-weight: 500; }
  .input-bar button:hover { background: #1557b0; }
  .input-bar button:disabled { background: #93b8f0; cursor: not-allowed; }
  .footer { text-align: center; padding: 8px; font-size: 12px; color: #888; background: #fff; border-top: 1px solid #eee; flex-shrink: 0; }
  @media (max-width: 600px) { .message { max-width: 90%; } .header h1 { font-size: 18px; } }
</style>
</head>
<body>
<div class="header">
  <h1>CIT Campus Assistant</h1>
  <p>Cambridge Institute of Technology, Bengaluru</p>
</div>
<div class="chat-container" id="chat">
  <div class="message assistant">Hi! I'm your CIT Campus Assistant. Ask me about HODs, canteen timings, library hours, or anything about campus!</div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
</div>
<div class="input-bar">
  <input type="text" id="input" placeholder="Ask me anything about CIT..." autocomplete="off">
  <button id="send" onclick="sendMessage()">Send</button>
</div>
<div class="footer">Powered by KubeAce &times; Claude</div>
<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const typing = document.getElementById('typing');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
  });

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = text;
    chat.insertBefore(div, typing);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMessage(text, 'user');
    sendBtn.disabled = true;
    typing.style.display = 'block';
    chat.scrollTop = chat.scrollHeight;
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      addMessage(data.response, 'assistant');
    } catch (err) {
      addMessage('Sorry, something went wrong. Please try again.', 'assistant');
    }
    typing.style.display = 'none';
    sendBtn.disabled = false;
    input.focus();
  }

  input.focus();
</script>
</body>
</html>
